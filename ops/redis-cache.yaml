apiVersion: apps/v1
kind: Deployment
metadata:
  name: money-manager-redis
  namespace: deployer-apps
  labels:
    app.kubernetes.io/name: money-manager-redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: money-manager-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: money-manager-redis
        app.kubernetes.io/component: cache
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 1000
      containers:
        - name: redis
          image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - >-
              exec redis-server
              --bind 0.0.0.0
              --protected-mode yes
              --requirepass "$REDIS_PASSWORD"
              --save ""
              --appendonly no
              --maxmemory 256mb
              --maxmemory-policy allkeys-lru
              --tcp-keepalive 60
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: money-manager-redis-auth
                  key: REDIS_PASSWORD
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: money-manager-redis-auth
                  key: REDIS_PASSWORD
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 1000
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: money-manager-redis
  namespace: deployer-apps
  labels:
    app.kubernetes.io/name: money-manager-redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: money-manager-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: money-manager-redis
  namespace: deployer-apps
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: money-manager-redis
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              deployer.io/app: money-manager-api
      ports:
        - protocol: TCP
          port: 6379
