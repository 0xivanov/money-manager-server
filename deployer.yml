name: money-manager-api
image: ghcr.io/0xivanov/money-manager-server@sha256:c356985734c6317deec4d9518a34e76d1485caa460db44610186400e6b56a557

service:
  port: 8080
  health:
    path: /readyz

routing:
  domain: money.0xivanov.dev

deploy:
  replicas: 2
  strategy: rolling

placement:
  arch: linux/arm64
  spread: true

secrets:
  - DATABASE_URL
  - REDIS_URL
  - JWT_SECRET
  - ENABLE_BANKING_APPLICATION_ID
  - ENABLE_BANKING_PRIVATE_KEY_BASE64
  - ENABLE_BANKING_CALLBACK_URL
  - ENABLE_BANKING_RESULT_REDIRECT_URL

state:
  mode: stateless

resilience:
  mode: resilient
