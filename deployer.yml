name: money-manager-api
image: ghcr.io/0xivanov/money-manager-server@sha256:61ff3100379695e12ae5b2f53ffac806d124a1d03d3acf471e8b51d38b66dd71

service:
  port: 8080
  health:
    path: /readyz

routing:
  domain: money.0xivanov.dev

deploy:
  replicas: 2
  strategy: rolling

placement:
  arch: linux/arm64
  spread: true

secrets:
  - DATABASE_URL
  - JWT_SECRET
  - ENABLE_BANKING_APPLICATION_ID
  - ENABLE_BANKING_PRIVATE_KEY_BASE64
  - ENABLE_BANKING_CALLBACK_URL

state:
  mode: stateless

resilience:
  mode: resilient
