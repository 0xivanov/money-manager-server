name: money-manager-api
image: ghcr.io/0xivanov/money-manager-server@sha256:7f20f3ad2f7406e0647485f9c283f5bee2c347e0c8cc2956a7045e1ab4731e3f

service:
  port: 8080
  health:
    path: /readyz

routing:
  domain: money.0xivanov.dev

deploy:
  replicas: 3
  strategy: rolling

placement:
  arch: any
  spread: true

secrets:
  - DATABASE_URL
  - REDIS_URL
  - JWT_SECRET
  - ENABLE_BANKING_APPLICATION_ID
  - ENABLE_BANKING_PRIVATE_KEY_BASE64
  - ENABLE_BANKING_CALLBACK_URL
  - ENABLE_BANKING_RESULT_REDIRECT_URL
  - TRADING212_API_KEY
  - TRADING212_API_SECRET
  - TRADING212_OWNER_USER_ID
  - MARKETSTACK_API_KEY

state:
  mode: stateless

resilience:
  mode: resilient
