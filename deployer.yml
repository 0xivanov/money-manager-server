name: money-manager-api
image: ghcr.io/0xivanov/money-manager-server@sha256:54e85dd3fbb5337887b63e2ce9a916defe3deec3d6e816c120dfe30f0430c27b

service:
  port: 8080
  health:
    path: /readyz

routing:
  domain: money.0xivanov.dev

deploy:
  replicas: 2
  strategy: rolling

placement:
  arch: linux/arm64
  spread: true

secrets:
  - DATABASE_URL
  - REDIS_URL
  - JWT_SECRET
  - ENABLE_BANKING_APPLICATION_ID
  - ENABLE_BANKING_PRIVATE_KEY_BASE64
  - ENABLE_BANKING_CALLBACK_URL
  - ENABLE_BANKING_RESULT_REDIRECT_URL
  - TRADING212_API_KEY
  - TRADING212_API_SECRET
  - TRADING212_OWNER_USER_ID
  - MARKETSTACK_API_KEY

state:
  mode: stateless

resilience:
  mode: resilient
