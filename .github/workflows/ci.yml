name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: money
          POSTGRES_PASSWORD: money
          POSTGRES_DB: money_manager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U money -d money_manager_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://money:money@127.0.0.1:5432/money_manager_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -coverprofile=coverage.out ./...
      - name: Race test
        run: go test -race ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: money-manager-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start local stack
        run: docker compose up --build --wait
      - name: Smoke test
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8080/livez
          curl --fail --silent --show-error http://127.0.0.1:8080/readyz
      - name: Logs on failure
        if: failure()
        run: docker compose logs
      - name: Stop local stack
        if: always()
        run: docker compose down --volumes
