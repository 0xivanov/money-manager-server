services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: money
      POSTGRES_PASSWORD: money
      POSTGRES_DB: money_manager
    ports:
      - "5432:5432"
    volumes:
      - money_manager_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U money -d money_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        VERSION: local
        COMMIT: local
    environment:
      PORT: 8080
      DATABASE_URL: postgres://money:money@db:5432/money_manager?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: local-development-only-change-me-0123456789abcdef0123456789abcdef
      JWT_ISSUER: money-manager-api
      JWT_AUDIENCE: money-manager-mobile
      JWT_TTL: 24h
      DB_MAX_CONNS: 10
      DB_MIN_CONNS: 2
      ENABLE_BANKING_APPLICATION_ID: ${ENABLE_BANKING_APPLICATION_ID:-}
      ENABLE_BANKING_PRIVATE_KEY: ${ENABLE_BANKING_PRIVATE_KEY:-}
      ENABLE_BANKING_PRIVATE_KEY_BASE64: ${ENABLE_BANKING_PRIVATE_KEY_BASE64:-}
      ENABLE_BANKING_PRIVATE_KEY_PATH: ${ENABLE_BANKING_PRIVATE_KEY_PATH:-}
      ENABLE_BANKING_CALLBACK_URL: ${ENABLE_BANKING_CALLBACK_URL:-http://localhost:8080/api/open-banking/callback}
      ENABLE_BANKING_RESULT_REDIRECT_URL: ${ENABLE_BANKING_RESULT_REDIRECT_URL:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  money_manager_pgdata:
